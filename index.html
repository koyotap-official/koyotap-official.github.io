<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KoyoTap</title>
    <style>
        :root {
            color-scheme: light dark;
            --background: #f7f7f4;
            --surface: #ffffff;
            --text: #1d2329;
            --muted: #59636e;
            --border: #d7d9dc;
            --accent: #176b5f;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #101417;
                --surface: #171d21;
                --text: #eef2f3;
                --muted: #b4bec7;
                --border: #2e383f;
                --accent: #62c7b4;
            }
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--background);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
        }

        main {
            width: min(100%, 680px);
            padding: 24px;
        }

        section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
            line-height: 1.15;
        }

        p {
            margin: 0 0 12px;
            color: var(--muted);
        }

        p:last-child {
            margin-bottom: 0;
        }

        a {
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>KoyoTap</h1>
            <p>Developer website for KoyoTap mobile applications.</p>
            <p><a href="https://koyotap-official.github.io/ArrowNext/privacy-policy.html">Arrow Next Privacy Policy</a></p>
            <p><a href="app-ads.txt">app-ads.txt</a></p>
        </section>
    </main>
</body>
</html>
